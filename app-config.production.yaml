app:
  baseUrl: https://kaas.ms.com
  title: Morgan Stanley KaaS Platform

backend:
  baseUrl: https://kaas.ms.com
  listen: ':7007'
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src: ["'self'", 'data:', 'https:']
    frame-src: ["'self'", 'https://grafana.ms.com']
  cors:
    origin: https://kaas.ms.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      ssl:
        require: true
        rejectUnauthorized: true

  cache:
    store: memory

auth:
  environment: production
  providers:
    microsoft:
      production:
        clientId: ${AZURE_CLIENT_ID}
        clientSecret: ${AZURE_CLIENT_SECRET}
        tenantId: ${AZURE_TENANT_ID}
        domainHint: morganstanley.com
        signIn:
          resolvers:
            - resolver: emailMatchingUserEntityAnnotation

proxy:
  endpoints:
    '/argocd/api':
      target: ${ARGOCD_URL}
      headers:
        Cookie: argocd.token=${ARGOCD_AUTH_TOKEN}
      changeOrigin: true
      secure: true
    '/prometheus/api':
      target: ${PROMETHEUS_URL}
      changeOrigin: true
      secure: true
    '/grafana/api':
      target: ${GRAFANA_URL}
      headers:
        Authorization: Bearer ${GRAFANA_TOKEN}
      changeOrigin: true
      secure: true
    '/vault/api':
      target: ${VAULT_URL}
      headers:
        X-Vault-Token: ${VAULT_TOKEN}
      changeOrigin: true
      secure: true

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        # Azure Management Cluster
        - name: ms-azure-mgmt
          url: ${AZURE_MGMT_CLUSTER_URL}
          authProvider: serviceAccount
          serviceAccountToken: ${AZURE_MGMT_SA_TOKEN}
          caData: ${AZURE_MGMT_CA_DATA}
          dashboardApp: standard
          title: Azure Management Cluster
        # AWS Management Cluster
        - name: ms-aws-mgmt
          url: ${AWS_MGMT_CLUSTER_URL}
          authProvider: serviceAccount
          serviceAccountToken: ${AWS_MGMT_SA_TOKEN}
          caData: ${AWS_MGMT_CA_DATA}
          dashboardApp: standard
          title: AWS Management Cluster
        # GCP Management Cluster
        - name: ms-gcp-mgmt
          url: ${GCP_MGMT_CLUSTER_URL}
          authProvider: serviceAccount
          serviceAccountToken: ${GCP_MGMT_SA_TOKEN}
          caData: ${GCP_MGMT_CA_DATA}
          dashboardApp: standard
          title: GCP Management Cluster

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User, Domain]
  locations:
    # Platform catalog entities
    - type: file
      target: ./catalog/systems.yaml
      rules:
        - allow: [System, Resource, Component]
    - type: file
      target: ./catalog/groups.yaml
      rules:
        - allow: [Group, User]

    # Cluster provisioning template
    - type: file
      target: ./templates/kubernetes-cluster/template.yaml
      rules:
        - allow: [Template]

    # Day 2 operations templates
    - type: file
      target: ./templates/cluster-upgrade/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/cluster-scale/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/cluster-destroy/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/namespace-request/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./templates/addon-management/template.yaml
      rules:
        - allow: [Template]

    # GitHub org discovery (production)
    # - type: github-org
    #   target: https://github.com/morgan-stanley
    #   rules:
    #     - allow: [User, Group]

scaffolder:
  defaultAuthor:
    name: Morgan Stanley KaaS Bot
    email: kaas-bot@morganstanley.com
  defaultCommitMessage: 'feat: scaffolded by Morgan Stanley KaaS Platform'
