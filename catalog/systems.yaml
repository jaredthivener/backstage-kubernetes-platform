---
# ============================================================================
# Morgan Stanley KaaS Platform - System Definitions
# ============================================================================
# These define the high-level systems that comprise the KaaS Platform.
# ============================================================================

apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-platform
  title: Kubernetes as a Service Platform
  description: >
    Morgan Stanley's internal Kubernetes as a Service platform. Enables
    development teams to provision, manage, and operate Kubernetes clusters
    across Azure (AKS), AWS (EKS), and GCP (GKE) using Cluster API,
    ArgoCD GitOps, and self-service Backstage templates.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: morganstanley/kaas-platform
  tags:
    - kubernetes
    - platform-engineering
    - cluster-api
    - gitops
  links:
    - url: https://backstage.ms.com
      title: KaaS Portal
      icon: dashboard
    - url: https://grafana.ms.com/d/kaas-overview
      title: Platform Monitoring
      icon: monitoring
    - url: https://wiki.ms.com/kaas
      title: Documentation
      icon: docs
spec:
  owner: group:platform-engineering
  domain: infrastructure

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-azure
  title: KaaS Azure Platform (AKS)
  description: >
    Azure Kubernetes Service clusters managed via Cluster API (CAPZ).
    Provides AKS clusters across dev, QA, and production environments.
  tags:
    - azure
    - aks
    - capz
  links:
    - url: https://portal.azure.com
      title: Azure Portal
      icon: cloud
spec:
  owner: group:platform-engineering
  domain: infrastructure
  subcomponentOf: system:kaas-platform

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-aws
  title: KaaS AWS Platform (EKS)
  description: >
    Elastic Kubernetes Service clusters managed via Cluster API (CAPA).
    Provides EKS clusters across dev, QA, and production environments.
  tags:
    - aws
    - eks
    - capa
  links:
    - url: https://console.aws.amazon.com/eks
      title: AWS Console
      icon: cloud
spec:
  owner: group:platform-engineering
  domain: infrastructure
  subcomponentOf: system:kaas-platform

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-gcp
  title: KaaS GCP Platform (GKE)
  description: >
    Google Kubernetes Engine clusters managed via Cluster API (CAPG).
    Provides GKE clusters across dev, QA, and production environments.
  tags:
    - gcp
    - gke
    - capg
  links:
    - url: https://console.cloud.google.com/kubernetes
      title: GCP Console
      icon: cloud
spec:
  owner: group:platform-engineering
  domain: infrastructure
  subcomponentOf: system:kaas-platform

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-monitoring
  title: KaaS Monitoring Stack
  description: >
    Centralized monitoring for all Kubernetes clusters. Uses Prometheus
    Operator with remote write federation, Grafana dashboards, and
    Alertmanager integration.
  tags:
    - monitoring
    - prometheus
    - grafana
spec:
  owner: group:platform-engineering
  domain: infrastructure
  subcomponentOf: system:kaas-platform

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kaas-security
  title: KaaS Security & Compliance
  description: >
    Security infrastructure including HashiCorp Vault integration,
    PCI-DSS network policies, Entra ID authentication, and zero-trust
    networking.
  tags:
    - security
    - vault
    - pci-dss
    - zero-trust
spec:
  owner: group:platform-engineering
  domain: infrastructure
  subcomponentOf: system:kaas-platform

