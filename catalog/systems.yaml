---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: kaas-argocd
  title: ArgoCD GitOps Controller
  description: >
    ArgoCD instances managing cluster GitOps workflows. Syncs CAPI manifests
    and cluster add-ons from Git repositories to management clusters.
  tags:
    - argocd
    - gitops
spec:
  type: service
  owner: group:platform-engineering
  system: kaas-platform
  lifecycle: production

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: kaas-vault
  title: HashiCorp Vault
  description: >
    HashiCorp Vault for secrets management across all KaaS clusters.
    Manages TLS certificates, service account tokens, and application secrets.
  tags:
    - vault
    - secrets
spec:
  type: service
  owner: group:platform-engineering
  system: kaas-security
  lifecycle: production

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: kaas-prometheus
  title: Prometheus Monitoring Stack
  description: >
    Central Prometheus instance with remote write receivers from all
    managed clusters. Powers Grafana dashboards and alerting.
  tags:
    - prometheus
    - monitoring
spec:
  type: monitoring
  owner: group:platform-engineering
  system: kaas-monitoring
  lifecycle: production
