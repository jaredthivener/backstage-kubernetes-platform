scaffolder:
  defaultAuthor:
    name: Morgan Stanley KaaS Platform
    email: kaas-platform@morganstanley.com
  defaultCommitMessage: 'chore: scaffolder action from KaaS Platform'

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Template
        - Group
        - User
  locations:
    # ========================================================================
    # KaaS Platform Templates
    # ========================================================================
    # Cluster Provisioning
    - type: file
      target: ../../templates/kubernetes-cluster/template.yaml
      rules:
        - allow: [Template]

    # Day 2 Operations
    - type: file
      target: ../../templates/cluster-upgrade/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/cluster-scale/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/cluster-destroy/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/namespace-request/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../templates/addon-management/template.yaml
      rules:
        - allow: [Template]

    # ========================================================================
    # Platform Catalog Entities
    # ========================================================================
    - type: file
      target: ../../catalog/systems.yaml
      rules:
        - allow: [System, Component]
    - type: file
      target: ../../catalog/clusters.yaml
      rules:
        - allow: [Resource]
    - type: file
      target: ../../catalog/groups.yaml
      rules:
        - allow: [Group, User]

    # ========================================================================
    # Example data (can be removed in production)
    # ========================================================================
    - type: file
      target: ../../examples/entities.yaml
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]

    ## Uncomment these lines to add an example org
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/acme-corp.yaml
    #   rules:
    #     - allow: [User, Group]

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: true
