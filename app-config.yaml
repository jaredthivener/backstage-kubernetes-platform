app:
  title: Morgan Stanley KaaS Platform
  baseUrl: http://localhost:3000
  support:
    url: https://github.com/morganstanley/kaas-platform/issues
    items:
      - title: KaaS Platform Support
        icon: chat
        links:
          - url: https://teams.microsoft.com/l/channel/kaas-support
            title: '#kaas-support on Teams'
      - title: Platform Engineering
        icon: group
        links:
          - url: https://backstage.ms.com/catalog/default/group/platform-engineering
            title: Platform Engineering Team

organization:
  name: Morgan Stanley

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src: ["'self'", 'data:', 'https://avatars.githubusercontent.com']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'
  # workingDirectory: /tmp

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

proxy:
  endpoints:
    # ArgoCD API proxy
    '/argocd/api':
      target: ${ARGOCD_BASE_URL:-http://localhost:8080}/api/v1/
      changeOrigin: true
      headers:
        Cookie: argocd.token=${ARGOCD_AUTH_TOKEN:-placeholder}
    # Prometheus API proxy
    '/prometheus/api':
      target: ${PROMETHEUS_URL:-http://localhost:9090}
      changeOrigin: true
    # Grafana API proxy
    '/grafana/api':
      target: ${GRAFANA_URL:-http://localhost:3001}
      changeOrigin: true
      headers:
        Authorization: Bearer ${GRAFANA_TOKEN:-placeholder}
    # Vault API proxy
    '/vault/api':
      target: ${VAULT_ADDR:-http://localhost:8200}
      changeOrigin: true
      headers:
        X-Vault-Token: ${VAULT_TOKEN:-placeholder}

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

# ============================================================================
# Authentication - Microsoft Entra ID (Azure AD)
# ============================================================================
auth:
  environment: development
  providers:
    guest: {}
    microsoft:
      development:
        clientId: ${AZURE_CLIENT_ID}
        clientSecret: ${AZURE_CLIENT_SECRET}
        tenantId: ${AZURE_TENANT_ID}
        domainHint: morganstanley.com
        additionalScopes:
          - 'User.Read'
          - 'GroupMember.Read.All'

