apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: kubernetes-addon-management
  title: Manage Cluster Add-ons
  description: |
    Install, upgrade, or remove add-ons on an existing Kubernetes cluster.
    Changes are committed to the cluster's GitOps repository addons directory
    and ArgoCD syncs them to the cluster. Supported add-ons include monitoring
    (Prometheus), ingress (NGINX), service mesh (Istio), Vault integration,
    cert-manager, and external-dns.
  tags:
    - kubernetes
    - addons
    - day2
    - gitops
    - helm
  annotations:
    backstage.io/techdocs-ref: dir:.
    morgan-stanley.com/owner-squad: platform-engineering
    morgan-stanley.com/compliance: pci-dss
  links:
    - title: Add-ons Catalog
      url: https://docs.internal.ms.com/platform/kubernetes/addons
      icon: docs
    - title: Helm Chart Versions
      url: https://docs.internal.ms.com/platform/kubernetes/addons/versions
      icon: dashboard
spec:
  owner: group:platform-engineering
  type: infrastructure
  lifecycle: production

  # ---------------------------------------------------------------------------
  # Parameters – multi-step wizard
  # ---------------------------------------------------------------------------
  parameters:
    # ── Step 1: Select Cluster ───────────────────────────────────────────────
    - title: Select Cluster
      required:
        - clusterRef
      properties:
        clusterRef:
          title: Target Cluster
          type: string
          description: Select the Kubernetes cluster to manage add-ons on.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Resource
              spec.type: kubernetes-cluster
            defaultKind: Resource
          ui:autofocus: true

    # ── Step 2: Add-on Selection ─────────────────────────────────────────────
    - title: Select Add-ons
      required:
        - addons
        - action
      properties:
        addons:
          title: Add-ons
          type: array
          description: Select one or more add-ons to manage.
          uniqueItems: true
          minItems: 1
          ui:widget: checkboxes
          items:
            type: string
            enum:
              - monitoring
              - ingress
              - service-mesh
              - vault
              - cert-manager
              - external-dns
            enumNames:
              - 'Monitoring — kube-prometheus-stack (Prometheus, Grafana, Alertmanager)'
              - 'Ingress — NGINX Ingress Controller with MS TLS certificates'
              - 'Service Mesh — Istio with strict mTLS'
              - 'Vault — HashiCorp Vault Agent Injector & CSI driver'
              - 'cert-manager — Automatic TLS certificate management'
              - 'external-dns — Automatic DNS record management'

        action:
          title: Action
          type: string
          description: The operation to perform on the selected add-ons.
          enum:
            - install
            - upgrade
            - remove
          enumNames:
            - Install — deploy add-ons to the cluster
            - Upgrade — update add-ons to latest approved version
            - Remove — uninstall add-ons from the cluster

    # ── Step 3: Add-on Configuration ─────────────────────────────────────────
    - title: Add-on Configuration
      properties:
        monitoringRemoteWrite:
          title: 'Monitoring: Enable Remote Write'
          type: boolean
          default: true
          description: |
            Send metrics to the central Prometheus via remote-write.
            Required for SRE dashboards and alerting.

        monitoringRetentionDays:
          title: 'Monitoring: Local Retention (Days)'
          type: integer
          default: 15
          minimum: 1
          maximum: 90
          description: Number of days to retain metrics locally on the cluster.

        ingressClass:
          title: 'Ingress: Ingress Class Name'
          type: string
          default: nginx
          enum:
            - nginx
            - nginx-internal
            - nginx-external
          enumNames:
            - 'nginx (default — internal + external)'
            - 'nginx-internal (internal load balancer only)'
            - 'nginx-external (external-facing only)'

        ingressDnsZone:
          title: 'Ingress: DNS Zone'
          type: string
          description: |
            DNS zone for ingress records. Auto-populated based on cloud provider
            and environment of the selected cluster.
          enum:
            # Azure
            - az-dev.ms.com
            - az-qa.ms.com
            - az.ms.com
            # AWS
            - aws-dev.ms.com
            - aws-qa.ms.com
            - aws.ms.com
            # GCP
            - gcp-dev.ms.com
            - gcp-qa.ms.com
            - gcp.ms.com

        serviceMeshStrictMtls:
          title: 'Service Mesh: Enforce Strict mTLS'
          type: boolean
          default: true
          description: |
            Enforce strict mTLS for all service-to-service communication.
            Required for PCI-DSS compliance.

        vaultAddress:
          title: 'Vault: Server Address'
          type: string
          default: https://vault.internal.ms.com
          description: HashiCorp Vault server endpoint.

        vaultAuthPath:
          title: 'Vault: Kubernetes Auth Path'
          type: string
          default: kubernetes/
          description: Vault Kubernetes auth method mount path.

        certManagerIssuer:
          title: 'cert-manager: Default Cluster Issuer'
          type: string
          default: letsencrypt-prod
          enum:
            - letsencrypt-prod
            - letsencrypt-staging
            - ms-internal-ca
          enumNames:
            - "Let's Encrypt (Production)"
            - "Let's Encrypt (Staging)"
            - 'Morgan Stanley Internal CA'

        externalDnsProvider:
          title: 'external-dns: DNS Provider'
          type: string
          default: azure
          enum:
            - azure
            - aws
            - google
          enumNames:
            - Azure DNS
            - AWS Route 53
            - Google Cloud DNS

    # ── Step 4: Confirmation ─────────────────────────────────────────────────
    - title: Review & Confirm
      properties:
        prBranch:
          title: Pull Request Branch Name
          type: string
          default: addons/manage
          description: Branch name for the add-on management pull request.
          pattern: '^[a-z0-9][a-z0-9/_-]{2,60}$'

        additionalNotes:
          title: Additional Notes
          type: string
          description: Optional notes to include in the pull request description.
          ui:widget: textarea
          ui:options:
            rows: 3

  # ---------------------------------------------------------------------------
  # Steps
  # ---------------------------------------------------------------------------
  steps:
    # ── 1. Fetch cluster info from catalog ───────────────────────────────────
    - id: catalog-fetch
      name: Fetch cluster details from catalog
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.clusterRef }}

    # ── 2. Render add-on manifests ───────────────────────────────────────────
    - id: fetch-template
      name: Render add-on manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./addon-patch
        values:
          clusterRef: ${{ parameters.clusterRef }}
          addons: ${{ parameters.addons }}
          action: ${{ parameters.action }}
          monitoringRemoteWrite: ${{ parameters.monitoringRemoteWrite }}
          monitoringRetentionDays: ${{ parameters.monitoringRetentionDays }}
          ingressClass: ${{ parameters.ingressClass }}
          ingressDnsZone: ${{ parameters.ingressDnsZone }}
          serviceMeshStrictMtls: ${{ parameters.serviceMeshStrictMtls }}
          vaultAddress: ${{ parameters.vaultAddress }}
          vaultAuthPath: ${{ parameters.vaultAuthPath }}
          certManagerIssuer: ${{ parameters.certManagerIssuer }}
          externalDnsProvider: ${{ parameters.externalDnsProvider }}

    # ── 3. Open PR to modify addons in cluster's GitOps repo ─────────────────
    - id: publish-pr
      name: Open add-on management pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=morgan-stanley&repo=k8s-cluster-${{ steps['catalog-fetch'].output.entity.metadata.annotations['morgan-stanley.com/gitops-repo'] }}
        branchName: ${{ parameters.prBranch }}
        title: 'chore(addons): ${{ parameters.action }} — ${{ parameters.addons }}'
        description: |
          ## Add-on Management Request

          | Field | Value |
          |-------|-------|
          | **Cluster** | `${{ parameters.clusterRef }}` |
          | **Action** | `${{ parameters.action }}` |
          | **Add-ons** | ${{ parameters.addons }} |

          ### Configuration Details

          #### Monitoring
          - Remote Write: `${{ parameters.monitoringRemoteWrite }}`
          - Local Retention: `${{ parameters.monitoringRetentionDays }} days`

          #### Ingress
          - Ingress Class: `${{ parameters.ingressClass }}`
          - DNS Zone: `${{ parameters.ingressDnsZone }}`

          #### Service Mesh
          - Strict mTLS: `${{ parameters.serviceMeshStrictMtls }}`

          #### Vault
          - Address: `${{ parameters.vaultAddress }}`
          - Auth Path: `${{ parameters.vaultAuthPath }}`

          #### cert-manager
          - Default Issuer: `${{ parameters.certManagerIssuer }}`

          #### external-dns
          - Provider: `${{ parameters.externalDnsProvider }}`

          ${{ parameters.additionalNotes }}

          ---
          _Opened by Backstage Software Template `kubernetes-addon-management`._
        sourcePath: ./addon-patch
        targetPath: /addons

  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  output:
    links:
      - title: Add-on Management Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Cluster in Backstage Catalog
        entityRef: ${{ parameters.clusterRef }}
      - title: ArgoCD Application
        url: https://argocd.internal.ms.com/applications/${{ parameters.clusterRef }}
    text:
      - title: Next Steps
        content: |
          A pull request has been opened to **${{ parameters.action }}** the following
          add-ons on cluster **${{ parameters.clusterRef }}**:

          ${{ parameters.addons }}

          1. Review the PR — ensure Helm values and versions are correct.
          2. Once merged, ArgoCD will sync the add-on manifests.
          3. Add-on deployment typically completes within 5-10 minutes.
          4. Verify in Grafana and ArgoCD that all components are healthy.
