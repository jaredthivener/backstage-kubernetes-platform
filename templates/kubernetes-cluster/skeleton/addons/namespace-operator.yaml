{%- if values.enableNamespaceOperator %}
# =============================================================================
# Namespace RBAC Operator
# Custom operator that provisions per-team namespaces with:
#   - Azure AD (Entra ID) group bindings
#   - Resource quotas
#   - Limit ranges
#   - Default network policies
#   - Vault auth roles
# =============================================================================

# ── Namespace (operator runs here) ──────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: namespace-operator
  labels:
    app.kubernetes.io/managed-by: gitops
    app.kubernetes.io/part-of: kubernetes-platform
    morgan-stanley.com/environment: ${{ values.environment }}
    morgan-stanley.com/compliance: pci-dss
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ── CRD: TeamNamespace ──────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teamnamespaces.platform.ms.com
  labels:
    app.kubernetes.io/part-of: kubernetes-platform
  annotations:
    morgan-stanley.com/description: "Defines a team namespace with RBAC, quotas, and policies"
spec:
  group: platform.ms.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - teamName
                - aadGroupId
              properties:
                teamName:
                  type: string
                  description: "Name of the team (used as namespace name)"
                  pattern: '^[a-z][a-z0-9-]{2,62}$'
                aadGroupId:
                  type: string
                  description: "Azure AD (Entra ID) group object ID for team members"
                aadAdminGroupId:
                  type: string
                  description: "Azure AD group ID for namespace admins"
                costCenter:
                  type: string
                  description: "Cost center code"
                environment:
                  type: string
                  enum: ["dev", "qa", "prod"]
                resourceQuota:
                  type: object
                  properties:
                    cpuRequests:
                      type: string
                      default: "10"
                    cpuLimits:
                      type: string
                      default: "20"
                    memoryRequests:
                      type: string
                      default: "32Gi"
                    memoryLimits:
                      type: string
                      default: "64Gi"
                    pods:
                      type: string
                      default: "100"
                    services:
                      type: string
                      default: "20"
                    persistentVolumeClaims:
                      type: string
                      default: "20"
                limitRange:
                  type: object
                  properties:
                    defaultCpuRequest:
                      type: string
                      default: "100m"
                    defaultCpuLimit:
                      type: string
                      default: "500m"
                    defaultMemoryRequest:
                      type: string
                      default: "128Mi"
                    defaultMemoryLimit:
                      type: string
                      default: "512Mi"
                    maxCpuLimit:
                      type: string
                      default: "4"
                    maxMemoryLimit:
                      type: string
                      default: "8Gi"
                enableNetworkPolicies:
                  type: boolean
                  default: true
                enableVaultIntegration:
                  type: boolean
                  default: true
                additionalRoleBindings:
                  type: array
                  items:
                    type: object
                    properties:
                      roleName:
                        type: string
                      groupId:
                        type: string
                      kind:
                        type: string
                        enum: ["ClusterRole", "Role"]
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Team
          type: string
          jsonPath: .spec.teamName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Cluster
  names:
    plural: teamnamespaces
    singular: teamnamespace
    kind: TeamNamespace
    shortNames:
      - tns

---
# ── ServiceAccount for the operator ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-operator
  namespace: namespace-operator
  labels:
    app.kubernetes.io/name: namespace-operator
    app.kubernetes.io/part-of: kubernetes-platform

---
# ── ClusterRole – permissions the operator needs ────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-operator
  labels:
    app.kubernetes.io/name: namespace-operator
    app.kubernetes.io/part-of: kubernetes-platform
rules:
  # Watch TeamNamespace CRDs
  - apiGroups: ["platform.ms.com"]
    resources: ["teamnamespaces", "teamnamespaces/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Create / manage namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Create RBAC resources
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Resource quotas and limit ranges
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Service accounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # SecretProviderClass for Vault
  - apiGroups: ["secrets-store.csi.x-k8s.io"]
    resources: ["secretproviderclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-operator
  labels:
    app.kubernetes.io/name: namespace-operator
    app.kubernetes.io/part-of: kubernetes-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: namespace-operator
subjects:
  - kind: ServiceAccount
    name: namespace-operator
    namespace: namespace-operator

---
# ── Operator Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-operator
  namespace: namespace-operator
  labels:
    app.kubernetes.io/name: namespace-operator
    app.kubernetes.io/part-of: kubernetes-platform
    app.kubernetes.io/version: "1.0.0"
    morgan-stanley.com/environment: ${{ values.environment }}
    morgan-stanley.com/compliance: pci-dss
  annotations:
    morgan-stanley.com/cluster: ${{ values.environment }}-${{ values.clusterName }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: namespace-operator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: namespace-operator
        app.kubernetes.io/part-of: kubernetes-platform
        morgan-stanley.com/environment: ${{ values.environment }}
        prometheus.io/scrape: "true"
      annotations:
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: namespace-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: namespace-operator
      containers:
        - name: operator
          image: registry.internal.ms.com/platform/namespace-operator:1.0.0
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --cluster-name=${{ values.environment }}-${{ values.clusterName }}
            - --environment=${{ values.environment }}
            - --vault-addr=https://vault.internal.ms.com:8200
            - --vault-auth-path=kubernetes/${{ values.environment }}-${{ values.clusterName }}
            - --enable-network-policies=true
            - --enable-vault-integration=true
          env:
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: namespace-operator-config
                  key: azure-tenant-id
            - name: CLUSTER_NAME
              value: ${{ values.environment }}-${{ values.clusterName }}
            - name: ENVIRONMENT
              value: ${{ values.environment }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
      volumes:
        - name: vault-tls
          secret:
            secretName: vault-tls-certs
            optional: true

---
# ── Default ClusterRoles for team namespaces ─────────────────────────────────

# Team admin – full access within namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-namespace-admin
  labels:
    app.kubernetes.io/part-of: kubernetes-platform
    morgan-stanley.com/role-type: team-admin
rules:
  - apiGroups: ["", "apps", "batch", "autoscaling", "policy", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["secrets-store.csi.x-k8s.io"]
    resources: ["secretproviderclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# Team developer – deploy and debug, no RBAC or secrets creation
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-namespace-developer
  labels:
    app.kubernetes.io/part-of: kubernetes-platform
    morgan-stanley.com/role-type: team-developer
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "deployments", "replicasets", "statefulsets", "daemonsets",
                "jobs", "cronjobs", "services", "configmaps", "events",
                "persistentvolumeclaims", "pods/log", "pods/exec", "pods/portforward"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# Team viewer – read-only access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-namespace-viewer
  labels:
    app.kubernetes.io/part-of: kubernetes-platform
    morgan-stanley.com/role-type: team-viewer
rules:
  - apiGroups: ["", "apps", "batch", "autoscaling", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
# ── Example TeamNamespace CR (teams create these via Backstage) ──────────────
apiVersion: platform.ms.com/v1alpha1
kind: TeamNamespace
metadata:
  name: ${{ values.ownerTeam }}
  labels:
    app.kubernetes.io/part-of: kubernetes-platform
    morgan-stanley.com/environment: ${{ values.environment }}
    morgan-stanley.com/owner: ${{ values.ownerTeam }}
spec:
  teamName: ${{ values.ownerTeam }}
  aadGroupId: "${AAD_TEAM_GROUP_ID}"
  aadAdminGroupId: "${AAD_TEAM_ADMIN_GROUP_ID}"
  costCenter: ${{ values.costCenter | default("UNASSIGNED") }}
  environment: ${{ values.environment }}
  resourceQuota:
    cpuRequests: "20"
    cpuLimits: "40"
    memoryRequests: "64Gi"
    memoryLimits: "128Gi"
    pods: "200"
    services: "30"
    persistentVolumeClaims: "30"
  limitRange:
    defaultCpuRequest: "100m"
    defaultCpuLimit: "500m"
    defaultMemoryRequest: "128Mi"
    defaultMemoryLimit: "512Mi"
    maxCpuLimit: "4"
    maxMemoryLimit: "8Gi"
  enableNetworkPolicies: true
  enableVaultIntegration: true
  additionalRoleBindings:
    - roleName: team-namespace-developer
      groupId: "${AAD_TEAM_DEV_GROUP_ID}"
      kind: ClusterRole
    - roleName: team-namespace-viewer
      groupId: "${AAD_TEAM_READONLY_GROUP_ID}"
      kind: ClusterRole

---
# ── PodDisruptionBudget for the operator ────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: namespace-operator
  namespace: namespace-operator
  labels:
    app.kubernetes.io/name: namespace-operator
    app.kubernetes.io/part-of: kubernetes-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: namespace-operator

{%- endif %}
