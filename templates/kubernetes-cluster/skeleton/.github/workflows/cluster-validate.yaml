# =============================================================================
# Cluster Validate Workflow (PR Checks)
# Lints, validates, runs policies, and diffs proposed changes on pull requests.
# =============================================================================
name: Cluster Validate (PR)

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.yaml'
      - '**.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  CLUSTER_NAME: "${{ values.environment }}-${{ values.clusterName }}"
  CLOUD_PROVIDER: "${{ values.cloudProvider }}"
  ENVIRONMENT: "${{ values.environment }}"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint YAML files
  # ---------------------------------------------------------------------------
  lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          echo "::group::YAML Lint Results"
          yamllint \
            -d '{extends: default, rules: {line-length: {max: 200}, truthy: disable, comments: {min-spaces-from-content: 1}}}' \
            -f github \
            cluster-definition.yaml addons/*.yaml argocd-app.yaml
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Job 2: Schema validation
  # ---------------------------------------------------------------------------
  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes schemas
        id: schema
        run: |
          RESULT=$(kubeconform \
            -strict \
            -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/kubernetes-sigs/cluster-api/main/config/crd/bases/{{.Group}}_{{.ResourceKind}}.json' \
            -skip Kustomization \
            -output json \
            cluster-definition.yaml addons/*.yaml 2>&1) || true
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" | jq -e '.summary.invalid == 0' || exit 1

      - name: Post schema results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = `{% raw %}${{ steps.schema.outputs.result }}{% endraw %}`;
            const passed = !result.includes('"invalid"');
            const icon = passed ? '✅' : '❌';
            const body = `### ${icon} Schema Validation\n\n\`\`\`json\n${result}\n\`\`\``;
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Schema Validation'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  # ---------------------------------------------------------------------------
  # Job 3: OPA / Conftest policy checks
  # ---------------------------------------------------------------------------
  policy-check:
    name: Policy Checks (PCI-DSS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Fetch PCI-DSS policies
        run: |
          git clone --depth 1 https://github.com/${{ values.repoOwner }}/platform-opa-policies.git /tmp/policies

      - name: Run policy checks
        id: policy
        run: |
          RESULT=$(conftest test \
            --policy /tmp/policies/pci-dss \
            --policy /tmp/policies/kubernetes \
            --all-namespaces \
            --output json \
            cluster-definition.yaml addons/*.yaml 2>&1) || true
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Fail if any failures found
          echo "$RESULT" | jq -e '[.[] | select(.failures | length > 0)] | length == 0' || exit 1

      - name: Post policy results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = `{% raw %}${{ steps.policy.outputs.result }}{% endraw %}`;
            let parsed;
            try { parsed = JSON.parse(result); } catch { parsed = []; }
            const failures = parsed.filter(r => r.failures && r.failures.length > 0);
            const warnings = parsed.filter(r => r.warnings && r.warnings.length > 0);
            const icon = failures.length === 0 ? '✅' : '❌';
            let body = `### ${icon} PCI-DSS Policy Checks\n\n`;
            body += `| Result | Count |\n|--------|-------|\n`;
            body += `| ✅ Passed | ${parsed.length - failures.length} |\n`;
            body += `| ❌ Failed | ${failures.length} |\n`;
            body += `| ⚠️ Warnings | ${warnings.length} |\n\n`;
            if (failures.length > 0) {
              body += `#### Failures\n\n`;
              failures.forEach(f => {
                f.failures.forEach(msg => {
                  body += `- **${f.filename}**: ${msg.msg}\n`;
                });
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  # ---------------------------------------------------------------------------
  # Job 4: Diff current vs proposed state
  # ---------------------------------------------------------------------------
  diff:
    name: Diff Planned Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: {% raw %}${{ github.event.pull_request.base.sha }}{% endraw %}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Install dyff
        run: |
          curl -sSL https://github.com/homeport/dyff/releases/download/v1.7.1/dyff_1.7.1_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Compute diff
        id: diff
        run: |
          DIFF_OUTPUT=""
          for file in cluster-definition.yaml argocd-app.yaml; do
            if [ -f "base/$file" ] && [ -f "pr/$file" ]; then
              FILE_DIFF=$(dyff between "base/$file" "pr/$file" --omit-header 2>&1) || true
              if [ -n "$FILE_DIFF" ]; then
                DIFF_OUTPUT="${DIFF_OUTPUT}\n### 📄 ${file}\n\`\`\`diff\n${FILE_DIFF}\n\`\`\`\n"
              fi
            elif [ -f "pr/$file" ]; then
              DIFF_OUTPUT="${DIFF_OUTPUT}\n### 📄 ${file} (new file)\n"
            fi
          done

          # Diff addon files
          for file in pr/addons/*.yaml; do
            fname=$(basename "$file")
            if [ -f "base/addons/$fname" ]; then
              FILE_DIFF=$(dyff between "base/addons/$fname" "$file" --omit-header 2>&1) || true
              if [ -n "$FILE_DIFF" ]; then
                DIFF_OUTPUT="${DIFF_OUTPUT}\n### 📄 addons/${fname}\n\`\`\`diff\n${FILE_DIFF}\n\`\`\`\n"
              fi
            else
              DIFF_OUTPUT="${DIFF_OUTPUT}\n### 📄 addons/${fname} (new file)\n"
            fi
          done

          if [ -z "$DIFF_OUTPUT" ]; then
            DIFF_OUTPUT="No semantic changes detected in cluster manifests."
          fi

          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$DIFF_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post diff to PR
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `{% raw %}${{ steps.diff.outputs.diff }}{% endraw %}`;
            const body = `## 🔀 Planned Cluster Changes\n\n**Cluster:** \`${{ values.environment }}-${{ values.clusterName }}\` | **Provider:** \`${{ values.cloudProvider | upper }}\` | **Region:** \`${{ values.region }}\`\n\n${diff}\n\n---\n_Review these changes carefully. Merging to \`main\` will trigger provisioning._`;
            // Find existing diff comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Planned Cluster Changes'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
