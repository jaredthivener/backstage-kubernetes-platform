apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: kubernetes-cluster-upgrade
  title: Upgrade Kubernetes Cluster
  description: |
    Upgrade the Kubernetes version on an existing cluster. The upgrade is
    performed via GitOps — a pull request is opened against the cluster's
    GitOps repository to update the Kubernetes version in the Cluster API
    manifest. ArgoCD syncs the change and the cloud provider performs a
    controlled upgrade of the control plane and node pools.
  tags:
    - kubernetes
    - cluster-api
    - day2
    - upgrade
    - gitops
  annotations:
    backstage.io/techdocs-ref: dir:.
    morgan-stanley.com/owner-squad: platform-engineering
    morgan-stanley.com/compliance: pci-dss
  links:
    - title: Upgrade Runbook
      url: https://docs.internal.ms.com/platform/kubernetes/upgrades
      icon: docs
    - title: Version Support Matrix
      url: https://docs.internal.ms.com/platform/kubernetes/versions
      icon: dashboard
spec:
  owner: group:platform-engineering
  type: infrastructure
  lifecycle: production

  # ---------------------------------------------------------------------------
  # Parameters – multi-step wizard
  # ---------------------------------------------------------------------------
  parameters:
    # ── Step 1: Select Cluster ───────────────────────────────────────────────
    - title: Select Cluster
      required:
        - clusterRef
      properties:
        clusterRef:
          title: Target Cluster
          type: string
          description: Select the Kubernetes cluster to upgrade from the catalog.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Resource
              spec.type: kubernetes-cluster
            defaultKind: Resource
          ui:autofocus: true

    # ── Step 2: Upgrade Configuration ────────────────────────────────────────
    - title: Upgrade Configuration
      required:
        - targetVersion
        - upgradeStrategy
        - maintenanceWindow
      properties:
        targetVersion:
          title: Target Kubernetes Version
          type: string
          description: The Kubernetes version to upgrade to.
          enum:
            - '1.28'
            - '1.29'
            - '1.30'
            - '1.31'
            - '1.32'
          enumNames:
            - '1.28 (LTS — security fixes only)'
            - '1.29 (Stable)'
            - '1.30 (Stable)'
            - '1.31 (Current)'
            - '1.32 (Latest)'

        upgradeStrategy:
          title: Upgrade Strategy
          type: string
          description: |
            Rolling — in-place rolling update of nodes one-by-one.
            Blue-Green — provision a parallel node pool, drain old nodes, then remove.
          default: rolling
          enum:
            - rolling
            - blue-green
          enumNames:
            - Rolling (in-place, lower cost)
            - Blue-Green (zero-downtime, higher cost)

        maintenanceWindow:
          title: Maintenance Window
          type: string
          description: Preferred maintenance window for the upgrade.
          enum:
            - weekend-night
            - weekday-night
            - saturday-morning
            - immediate
          enumNames:
            - Weekend Night (Sat 00:00–06:00 UTC)
            - Weekday Night (Tue–Thu 00:00–04:00 UTC)
            - Saturday Morning (Sat 06:00–12:00 UTC)
            - Immediate (skip window — not recommended for prod)

        skipNodeUpgrade:
          title: Skip Node Pool Upgrade
          type: boolean
          default: false
          description: |
            Upgrade the control plane only — defer node pool upgrades.
            Useful for staged rollouts across environments.

    # ── Step 3: Confirmation ─────────────────────────────────────────────────
    - title: Review & Confirm
      required:
        - prBranch
      properties:
        prBranch:
          title: Pull Request Branch Name
          type: string
          default: upgrade/kubernetes-version
          description: Branch name for the upgrade pull request.
          pattern: '^[a-z0-9][a-z0-9/_-]{2,60}$'
          ui:help: 'Lowercase alphanumeric, hyphens, underscores, and slashes.'

        additionalNotes:
          title: Additional Notes
          type: string
          description: Optional notes to include in the pull request description.
          ui:widget: textarea
          ui:options:
            rows: 4

  # ---------------------------------------------------------------------------
  # Steps
  # ---------------------------------------------------------------------------
  steps:
    # ── 1. Fetch cluster info from catalog ───────────────────────────────────
    - id: catalog-fetch
      name: Fetch cluster details from catalog
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.clusterRef }}

    # ── 2. Fetch & render the upgrade patch ──────────────────────────────────
    - id: fetch-template
      name: Render upgrade manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./upgrade-patch
        values:
          clusterRef: ${{ parameters.clusterRef }}
          targetVersion: ${{ parameters.targetVersion }}
          upgradeStrategy: ${{ parameters.upgradeStrategy }}
          maintenanceWindow: ${{ parameters.maintenanceWindow }}
          skipNodeUpgrade: ${{ parameters.skipNodeUpgrade }}

    # ── 3. Open PR against the cluster's GitOps repo ─────────────────────────
    - id: publish-pr
      name: Open upgrade pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=morgan-stanley&repo=k8s-cluster-${{ steps['catalog-fetch'].output.entity.metadata.annotations['morgan-stanley.com/gitops-repo'] }}
        branchName: ${{ parameters.prBranch }}
        title: 'chore(upgrade): Kubernetes ${{ parameters.targetVersion }} — ${{ parameters.upgradeStrategy }}'
        description: |
          ## Kubernetes Version Upgrade

          | Field | Value |
          |-------|-------|
          | **Cluster** | `${{ parameters.clusterRef }}` |
          | **Target Version** | `${{ parameters.targetVersion }}` |
          | **Strategy** | `${{ parameters.upgradeStrategy }}` |
          | **Maintenance Window** | `${{ parameters.maintenanceWindow }}` |
          | **Skip Node Upgrade** | `${{ parameters.skipNodeUpgrade }}` |

          ${{ parameters.additionalNotes }}

          ---
          _Opened by Backstage Software Template `kubernetes-cluster-upgrade`._
        sourcePath: ./upgrade-patch
        targetPath: /

  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  output:
    links:
      - title: Upgrade Pull Request
        url: ${{ steps['publish-pr'].output.remoteUrl }}
      - title: Cluster in Backstage Catalog
        entityRef: ${{ parameters.clusterRef }}
      - title: ArgoCD Application
        url: https://argocd.internal.ms.com/applications/${{ parameters.clusterRef }}
    text:
      - title: Next Steps
        content: |
          A pull request has been opened to upgrade cluster
          **${{ parameters.clusterRef }}** to Kubernetes **${{ parameters.targetVersion }}**
          using the **${{ parameters.upgradeStrategy }}** strategy.

          1. Review the PR and approve it.
          2. ArgoCD will sync the change during the **${{ parameters.maintenanceWindow }}**
             maintenance window.
          3. Monitor the upgrade in the ArgoCD dashboard and Grafana.

          Estimated upgrade duration: ~15-30 minutes (control plane) + ~2 min/node (node pools).
