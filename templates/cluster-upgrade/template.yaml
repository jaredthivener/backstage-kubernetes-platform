apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: kubernetes-cluster-upgrade
  title: Kubernetes Cluster Upgrade Orchestrator
  description: |
    Run polished, guided upgrades for one or many Kubernetes clusters.
    This workflow opens GitOps pull requests with a consistent upgrade plan,
    strategy, and maintenance window so platform teams can execute safe,
    repeatable Kubernetes version rollouts.
  tags:
    - kubernetes
    - cluster-api
    - day2
    - upgrade
    - gitops
  annotations:
    backstage.io/techdocs-ref: dir:.
    morgan-stanley.com/owner-squad: platform-engineering
    morgan-stanley.com/compliance: pci-dss
  links:
    - title: Upgrade Runbook
      url: https://docs.internal.ms.com/platform/kubernetes/upgrades
      icon: docs
    - title: Version Support Matrix
      url: https://docs.internal.ms.com/platform/kubernetes/versions
      icon: dashboard
spec:
  owner: group:platform-engineering
  type: infrastructure
  lifecycle: production

  # ---------------------------------------------------------------------------
  # Parameters – multi-step wizard
  # ---------------------------------------------------------------------------
  parameters:
    # ── Step 1: Upgrade Scope ────────────────────────────────────────────────
    - title: Upgrade Scope
      required:
        - scope
      properties:
        scope:
          title: Scope
          type: string
          default: single
          description: Choose whether to upgrade one cluster or run a coordinated bulk upgrade.
          enum:
            - single
            - bulk
          enumNames:
            - Single Cluster
            - Multiple Clusters (Bulk)
          ui:widget: radio

        clusterRef:
          title: Target Cluster (Single)
          type: string
          description: Select one cluster for a targeted upgrade.
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Resource
              spec.type: kubernetes-cluster
            defaultKind: Resource
          ui:autofocus: true

        clusterRefs:
          title: Target Clusters (Bulk)
          type: array
          description: |
            Add one or more cluster entity refs in this format:
            `resource:default/<cluster-name>`.
          minItems: 1
          uniqueItems: true
          items:
            title: Cluster Entity Ref
            type: string
            pattern: '^resource:[a-z0-9-]+\/[a-z0-9-]+$'
            examples:
              - resource:default/prod-trading-aks
              - resource:default/staging-risk-eks

      dependencies:
        scope:
          oneOf:
            - properties:
                scope:
                  const: single
              required:
                - clusterRef
            - properties:
                scope:
                  const: bulk
              required:
                - clusterRefs

    # ── Step 2: Upgrade Configuration ────────────────────────────────────────
    - title: Upgrade Configuration
      required:
        - targetVersion
        - upgradeStrategy
        - maintenanceWindow
      properties:
        targetVersion:
          title: Target Kubernetes Version
          type: string
          description: Kubernetes target version for all selected clusters.
          default: '1.31'
          enum:
            - '1.31'
            - '1.33'
            - '1.35'
          ui:widget: radio
          enumNames:
            - '1.31 (Supported)'
            - '1.33 (Supported)'
            - '1.35 (Supported)'

        upgradeStrategy:
          title: Upgrade Strategy
          type: string
          description: |
            Rolling — in-place rolling update of nodes one-by-one.
            Blue-Green — provision a parallel node pool, drain old nodes, then remove.
          default: rolling
          enum:
            - rolling
            - blue-green
          enumNames:
            - Rolling (in-place, lower cost)
            - Blue-Green (zero-downtime, higher cost)

        maintenanceWindow:
          title: Maintenance Window
          type: string
          description: Preferred maintenance window for the upgrade.
          default: weekend-night
          enum:
            - weekend-night
            - weekday-night
            - saturday-morning
            - immediate
          ui:widget: radio
          enumNames:
            - Weekend Night (Sat 00:00–06:00 UTC)
            - Weekday Night (Tue–Thu 00:00–04:00 UTC)
            - Saturday Morning (Sat 06:00–12:00 UTC)
            - Immediate (skip window — not recommended for prod)

        skipNodeUpgrade:
          title: Skip Node Pool Upgrade
          type: boolean
          default: false
          description: |
            Upgrade the control plane only — defer node pool upgrades.
            Useful for staged rollouts across environments.

        requirePlatformApproval:
          title: Require Platform Approval Before Merge
          type: boolean
          default: true
          description: Add a mandatory platform approval gate in the PR checklist.

    # ── Step 3: Confirmation ─────────────────────────────────────────────────
    - title: Review & Confirm
      required:
        - prBranchPrefix
      properties:
        prBranchPrefix:
          title: Pull Request Branch Prefix
          type: string
          default: upgrade/kubernetes-version
          description: Prefix for generated branch names.
          pattern: '^[a-z0-9][a-z0-9/_-]{2,60}$'
          ui:help: 'Lowercase alphanumeric, hyphens, underscores, and slashes.'

        additionalNotes:
          title: Additional Notes
          type: string
          description: Optional notes to include in the pull request description.
          ui:widget: textarea
          ui:options:
            rows: 4

  # ---------------------------------------------------------------------------
  # Steps
  # ---------------------------------------------------------------------------
  steps:
    # ── 1. Render one patch per cluster ──────────────────────────────────────
    - id: render-upgrade-patches
      name: Render upgrade manifests
      each: "${{ parameters.scope === 'single' ? [parameters.clusterRef] : parameters.clusterRefs }}"
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./upgrade-patch-${{ each.index }}
        values:
          clusterRef: ${{ each.value }}
          clusterName: ${{ each.value | replace('resource:default/', '') }}
          targetVersion: ${{ parameters.targetVersion }}
          upgradeStrategy: ${{ parameters.upgradeStrategy }}
          maintenanceWindow: ${{ parameters.maintenanceWindow }}
          skipNodeUpgrade: ${{ parameters.skipNodeUpgrade }}
          requirePlatformApproval: ${{ parameters.requirePlatformApproval }}
          additionalNotes: ${{ parameters.additionalNotes }}

    # ── 2. Open one PR per selected cluster ──────────────────────────────────
    - id: publish-prs
      name: Open upgrade pull requests
      each: "${{ parameters.scope === 'single' ? [parameters.clusterRef] : parameters.clusterRefs }}"
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=morgan-stanley&repo=k8s-cluster-${{ each.value | replace('resource:default/', '') }}
        branchName: ${{ parameters.prBranchPrefix }}-${{ each.index + 1 }}
        title: 'chore(upgrade): ${{ each.value | replace("resource:default/", "") }} to Kubernetes ${{ parameters.targetVersion }}'
        description: |
          ## Kubernetes Version Upgrade

          | Field | Value |
          |-------|-------|
          | **Cluster** | `${{ each.value }}` |
          | **Target Version** | `${{ parameters.targetVersion }}` |
          | **Strategy** | `${{ parameters.upgradeStrategy }}` |
          | **Maintenance Window** | `${{ parameters.maintenanceWindow }}` |
          | **Skip Node Upgrade** | `${{ parameters.skipNodeUpgrade }}` |
          | **Platform Approval Required** | `${{ parameters.requirePlatformApproval }}` |

          ${{ parameters.additionalNotes }}

          ---
          _Opened by Backstage Software Template `kubernetes-cluster-upgrade`._
        sourcePath: ./upgrade-patch-${{ each.index }}
        targetPath: /

  # ---------------------------------------------------------------------------
  # Output
  # ---------------------------------------------------------------------------
  output:
    text:
      - title: Next Steps
        content: |
          Upgrade pull requests have been opened for
          **${{ parameters.scope == 'single' ? 1 : parameters.clusterRefs.length }} cluster(s)**
          targeting Kubernetes **${{ parameters.targetVersion }}**.

          1. Review and approve each PR.
          2. ArgoCD will sync the change during the **${{ parameters.maintenanceWindow }}**
             maintenance window.
          3. Monitor each rollout in ArgoCD and Grafana.

          Estimated upgrade duration: ~15-30 minutes (control plane) + ~2 min/node (node pools).
